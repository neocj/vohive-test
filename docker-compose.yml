services:
  vohive:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    image: ghcr.io/neocj/vohive-test:arm64
    container_name: vohive
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CONFIG_PATH: /app/config/config.yaml
      VOHIVE_ADMIN_PASSWORD: ${VOHIVE_ADMIN_PASSWORD:?set VOHIVE_ADMIN_PASSWORD in .env before starting VoHive}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - "${VOHIVE_SERIAL_DEVICE:?set VOHIVE_SERIAL_DEVICE in .env, for example /dev/ttyUSB2}:${VOHIVE_SERIAL_DEVICE:?set VOHIVE_SERIAL_DEVICE in .env, for example /dev/ttyUSB2}"
      - "${VOHIVE_CONTROL_DEVICE:?set VOHIVE_CONTROL_DEVICE in .env, for example /dev/cdc-wdm0}:${VOHIVE_CONTROL_DEVICE:?set VOHIVE_CONTROL_DEVICE in .env, for example /dev/cdc-wdm0}"
